<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Training Log</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.7/babel.min.js"></script>
<style>
  html, body { margin: 0; padding: 0; background: #0c0a09; }
  * { box-sizing: border-box; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">

const { useState, useEffect } = React;

// ---- localStorage-backed replacement for the artifact-only window.storage API ----
const storage = {
  async get(key) {
    const v = localStorage.getItem(key);
    if (v === null) throw new Error('not found');
    return { key, value: v };
  },
  async set(key, value) {
    localStorage.setItem(key, value);
    return { key, value };
  }
};


const EXERCISES = {
  flatBench:      { name: 'Flat Bench',          sets: 3, repMin: 8,  repMax: 10, weight: 50,   unit: 'kg',      increment: 2.5 },
  inclinePress:   { name: 'Incline Press',       sets: 3, repMin: 8,  repMax: 10, weight: 60,   unit: 'kg',      increment: 2.5, note: 'Barbell — or 20kg DBs each side' },
  shoulderPress:  { name: 'Shoulder Press',      sets: 2, repMin: 10, repMax: 10, weight: 14,   unit: 'kg',      increment: 2 },
  cableLateral:   { name: 'Cable Lateral Raise', sets: 2, repMin: 12, repMax: 12, weightL: 14,  weightR: 9, unit: 'kg', increment: 1, caution: true, note: 'Right side limited by tennis elbow — go up only if comfortable' },
  ropePressdown:  { name: 'Rope Pressdown',      sets: 2, repMin: 10, repMax: 12, weight: 50,   unit: 'kg',      increment: 2.5 },
  lowHighFly:     { name: 'Low-High Fly',        sets: 2, repMin: 10, repMax: 12, weight: 23,   unit: 'kg',      increment: 2 },
  latPulldown:    { name: 'Lat Pulldown',        sets: 3, repMin: 10, repMax: 10, weight: 64,   unit: 'kg',      increment: 2.5 },
  singleArmRow:   { name: 'Single Arm Row',      sets: 3, repMin: 10, repMax: 10, weight: 22,   unit: 'kg',      increment: 2 },
  ezBarCurl:      { name: 'EZ Bar Curl',         sets: 3, repMin: 8,  repMax: 8,  weight: 30,   unit: 'kg',      increment: 2.5, caution: true, note: 'Watch right elbow' },
  farmersCarry:   { name: "Farmer's Carry",      sets: 3, repMin: 0,  repMax: 0,  weight: 20,   unit: 'kg/hand', increment: 2.5, noReps: true },
  legPress:       { name: 'Leg Press',           sets: 3, repMin: 8,  repMax: 8,  weight: 82,   unit: 'kg',      increment: 5 },
  rdl:            { name: 'RDL',                 sets: 3, repMin: 8,  repMax: 8,  weight: 55,   unit: 'kg',      increment: 2.5 },
  walkingLunges:  { name: 'Walking Lunges',      sets: 3, repMin: 10, repMax: 12, weight: 14,   unit: 'kg DBs',  increment: 2 },
  seatedLegCurl:  { name: 'Seated Leg Curl',     sets: 3, repMin: 12, repMax: 12, weight: 54,   unit: 'kg',      increment: 5 },
  proneLegCurl:   { name: 'Prone Leg Curl',      sets: 2, repMin: 10, repMax: 12, weight: 36,   unit: 'kg',      increment: 5 },
  calfRaises:     { name: 'Calf Raises',         sets: 2, repMin: 12, repMax: 15, weight: 30,   unit: 'kg',      increment: 5 },
  closeGripBench: { name: 'Close Grip Bench',    sets: 3, repMin: 6,  repMax: 8,  weight: 50,   unit: 'kg',      increment: 2.5, caution: true, note: 'Watch right elbow' },
  preacherCurl:   { name: 'Preacher Curl',       sets: 2, repMin: 12, repMax: 12, weight: 25,   unit: 'kg',      increment: 2.5, caution: true, note: 'Watch right elbow' },
  hammerCurl:     { name: 'Hammer Curl',         sets: 3, repMin: 10, repMax: 10, weight: 12,   unit: 'kg',      increment: 2,   caution: true, note: 'Watch right elbow' },
};

const DAYS = {
  '1':  ['inclinePress', 'flatBench', 'shoulderPress', 'cableLateral', 'ropePressdown', 'lowHighFly'],
  '2':  ['latPulldown', 'singleArmRow', 'ezBarCurl', 'farmersCarry'],
  '3':  ['legPress', 'rdl', 'walkingLunges', 'seatedLegCurl', 'proneLegCurl', 'calfRaises'],
  '4':  ['closeGripBench', 'preacherCurl', 'hammerCurl', 'ropePressdown'],
};

const STORAGE_KEY = 'lee-training-log-v1';

function buildDefaultState() {
  const s = {};
  Object.entries(EXERCISES).forEach(([id, ex]) => {
    s[id] = {
      weight: ex.weight, weightL: ex.weightL, weightR: ex.weightR,
      history: [],
      notes: id === 'farmersCarry' ? '40m per set, plus shoulder shrugs after' : ''
    };
  });
  return s;
}

function getSuggestion(ex, sets) {
  const maxEffort = Math.max(...sets.map(s => s.effort));
  if (ex.noReps) {
    if (maxEffort <= 7) return { action: 'increase', text: `Felt manageable — try +${ex.increment}${ex.unit.replace('/hand','')} per hand next time.` };
    if (maxEffort >= 9) return { action: 'hold', text: 'Tough effort — hold this load and focus on form.' };
    return { action: 'hold', text: 'Solid carry — repeat this load next time.' };
  }
  const reps = sets.map(s => s.reps);
  const allHitTop = reps.every(r => Number(r) >= ex.repMax);
  const anyBelowMin = reps.some(r => Number(r) < ex.repMin);
  if (allHitTop && maxEffort <= 7) return { action: 'increase', text: `Top of range, felt controlled — go up ${ex.increment}${ex.unit} next time.` };
  if (maxEffort >= 9 || anyBelowMin) return { action: 'hold', text: `Hold this weight — focus on hitting ${ex.repMin}–${ex.repMax} reps with good form.` };
  return { action: 'hold', text: 'Solid session — same weight next time, aim for the top of the rep range.' };
}

const effortBg = e => e <= 6 ? '#166534' : e <= 8 ? '#92400e' : '#991b1b';

function CopySummaryButton({ text, label }) {
  const [copied, setCopied] = useState(false);
  const handleCopy = async () => {
    try {
      await navigator.clipboard.writeText(text);
    } catch {
      // clipboard API blocked — fall back to a temporary textarea
      const ta = document.createElement('textarea');
      ta.value = text;
      document.body.appendChild(ta);
      ta.select();
      try { document.execCommand('copy'); } catch {}
      document.body.removeChild(ta);
    }
    setCopied(true);
    setTimeout(() => setCopied(false), 2000);
  };
  return (
    <button
      onClick={handleCopy}
      style={{ width: '100%', padding: '8px 16px', borderRadius: 8, border: '1px solid #52525b', background: copied ? '#166534' : '#27272a', color: copied ? '#86efac' : '#e4e4e7', fontSize: 13, cursor: 'pointer', marginTop: 6 }}
    >
      {copied ? '✓ Copied — paste it to Claude in chat' : label}
    </button>
  );
}

function ExerciseCard({ id, ex, data, onLog, onNoteChange }) {
  const [open, setOpen] = useState(false);
  const [sets, setSets] = useState(Array.from({ length: ex.sets }, () => ({ reps: ex.repMax || '', effort: 7 })));
  const [logged, setLogged] = useState(false);
  const [suggestion, setSuggestion] = useState(null);
  const [note, setNote] = useState(data.notes || '');
  const [change, setChange] = useState('');

  const weightLabel = ex.weightL !== undefined
    ? `L ${data.weightL}${ex.unit} / R ${data.weightR}${ex.unit}`
    : `${data.weight}${ex.unit}`;

  const trend = data.history.slice(-4).map(h => h.weightLabel).join(' → ');
  const last = data.history[data.history.length - 1];

  const handleLog = () => {
    const sug = getSuggestion(ex, sets);
    setSuggestion(sug);
    setLogged(true);
    onLog(id, sets, sug);
  };

  const handleSaveChange = () => {
    if (!change.trim()) return;
    const kgMatch = change.match(/(\d+\.?\d*)\s*kg/i);
    const numMatch = change.match(/\b(\d+\.?\d*)\b/);
    let updates = {};
    if (kgMatch) updates.weight = parseFloat(kgMatch[1]);
    else if (numMatch) updates.weight = parseFloat(numMatch[1]);
    if (Object.keys(updates).length > 0) onNoteChange(id, updates, change);
    else onNoteChange(id, {}, change);
  };

  const summaryText = (() => {
    const wLabel = ex.weightL !== undefined ? `L ${data.weightL}kg / R ${data.weightR}kg` : `${data.weight}${ex.unit}`;
    const setsDesc = sets.map((s,i) => ex.noReps ? `Set ${i+1}: effort ${s.effort}/10` : `Set ${i+1}: ${s.reps} reps @ effort ${s.effort}/10`).join(', ');
    let text =
      `[Training log — ${ex.name}]\n` +
      `Weight: ${wLabel} | Sets: ${setsDesc} | Target: ${ex.noReps ? 'carries' : `${ex.repMin}–${ex.repMax} reps`}\n` +
      `System suggestion: ${suggestion ? suggestion.text : 'N/A'}\n` +
      `Right elbow caution: ${ex.caution ? 'YES' : 'no'}`;
    if (change.trim()) text += `\nMy note: ${change}`;
    return text + `\n\nCan you give me a quick read on this and what to do next time?`;
  })();

  return (
    <div style={{ border: '1px solid #292524', borderRadius: 12, background: '#1c1917', marginBottom: 8, overflow: 'hidden' }}>
      <button
        onClick={() => setOpen(o => !o)}
        style={{ width: '100%', display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '12px 14px', background: 'none', border: 'none', cursor: 'pointer', textAlign: 'left' }}
      >
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 6, flexWrap: 'wrap' }}>
            <span style={{ fontSize: 14, fontWeight: 600, color: logged ? '#86efac' : '#f5f5f4' }}>
              {logged ? '✓ ' : ''}{ex.name}
            </span>
            {ex.caution && (
              <span style={{ fontSize: 11, background: '#431407', color: '#fb923c', padding: '1px 6px', borderRadius: 4, border: '1px solid #7c2d12', flexShrink: 0 }}>
                ⚠ elbow
              </span>
            )}
          </div>
          <div style={{ fontSize: 12, color: '#78716c', marginTop: 2 }}>
            {weightLabel} · {ex.sets} × {ex.noReps ? 'carries' : (ex.repMin === ex.repMax ? ex.repMin : `${ex.repMin}–${ex.repMax}`)}
          </div>
          {data.notes && (
            <div style={{ fontSize: 11, color: '#57534e', marginTop: 1, fontStyle: 'italic', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
              {data.notes}
            </div>
          )}
        </div>
        <span style={{ color: '#78716c', fontSize: 16, marginLeft: 8, flexShrink: 0 }}>{open ? '▲' : '▼'}</span>
      </button>

      {open && (
        <div style={{ borderTop: '1px solid #292524', padding: '12px 14px' }}>
          {ex.note && (
            <div style={{ fontSize: 12, color: '#fbbf24', background: 'rgba(120,53,15,0.3)', border: '1px solid rgba(161,98,7,0.4)', borderRadius: 8, padding: '7px 10px', marginBottom: 10 }}>
              ℹ {ex.note}
            </div>
          )}
          {trend && <div style={{ fontSize: 12, color: '#57534e', marginBottom: 10 }}>📈 {trend}</div>}

          {sets.map((s, i) => (
            <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 7 }}>
              <span style={{ fontSize: 12, color: '#57534e', width: 44, flexShrink: 0 }}>Set {i+1}</span>
              {!ex.noReps && (
                <input
                  type="number" inputMode="numeric" value={s.reps}
                  onChange={e => setSets(prev => prev.map((x, idx) => idx === i ? { ...x, reps: e.target.value === '' ? '' : Number(e.target.value) } : x))}
                  placeholder="reps"
                  style={{ width: 60, background: '#0c0a09', border: '1px solid #292524', borderRadius: 8, padding: '6px 8px', fontSize: 13, color: '#f5f5f4', textAlign: 'center' }}
                />
              )}
              <select
                value={s.effort}
                onChange={e => setSets(prev => prev.map((x, idx) => idx === i ? { ...x, effort: Number(e.target.value) } : x))}
                style={{ flex: 1, background: effortBg(s.effort), border: 'none', borderRadius: 8, padding: '6px 8px', fontSize: 12, color: '#fff' }}
              >
                {Array.from({ length: 10 }, (_, n) => (
                  <option key={n+1} value={n+1}>{n+1 === 8 ? 'Effort 8 — hard but done' : `Effort ${n+1}`}</option>
                ))}
              </select>
            </div>
          ))}

          <button
            onClick={handleLog}
            style={{ width: '100%', padding: 10, borderRadius: 8, background: '#c2410c', border: 'none', color: '#fff', fontSize: 14, fontWeight: 600, cursor: 'pointer', marginTop: 6 }}
          >
            {logged ? 'Re-log session' : 'Log session'}
          </button>

          {suggestion && (
            <div style={{
              marginTop: 10, padding: '10px 12px', borderRadius: 8, fontSize: 13,
              background: suggestion.action === 'increase' ? 'rgba(20,83,45,0.4)' : '#1c1917',
              border: `1px solid ${suggestion.action === 'increase' ? 'rgba(22,101,52,0.5)' : '#292524'}`,
              color: suggestion.action === 'increase' ? '#86efac' : '#a8a29e'
            }}>
              {suggestion.text}
              {ex.weightL !== undefined && suggestion.action === 'increase' && (
                <div style={{ fontSize: 11, marginTop: 4, opacity: 0.7 }}>Right side is your call — only if the elbow allows.</div>
              )}
            </div>
          )}

          {logged && (
            <div style={{ marginTop: 10, padding: '12px', borderRadius: 10, border: '1px solid #3f3f46', background: '#18181b' }}>
              <div style={{ fontSize: 12, color: '#a1a1aa', marginBottom: 6, fontWeight: 600 }}>
                Any changes or corrections?
              </div>
              <textarea
                value={change}
                onChange={e => setChange(e.target.value)}
                onBlur={handleSaveChange}
                placeholder={'e.g. "Used 55kg instead" or "swapped to dumbbells" or "skipped right side"'}
                rows={2}
                style={{ width: '100%', background: '#0c0a09', border: '1px solid #3f3f46', borderRadius: 8, padding: '7px 10px', fontSize: 13, color: '#e4e4e7', resize: 'none', fontFamily: 'system-ui', boxSizing: 'border-box' }}
              />
              <CopySummaryButton text={summaryText} label="Copy summary to ask Claude →" />
            </div>
          )}

          {last && (
            <div style={{ fontSize: 12, color: '#57534e', marginTop: 10 }}>
              Last ({last.weightLabel}): {last.sets.map(s => ex.noReps ? `e${s.effort}` : `${s.reps}@e${s.effort}`).join(', ')}
            </div>
          )}

          <div style={{ marginTop: 10 }}>
            <label style={{ fontSize: 12, color: '#57534e', display: 'block', marginBottom: 4 }}>Notes</label>
            <textarea
              value={note}
              onChange={e => setNote(e.target.value)}
              onBlur={() => onNoteChange(id, {}, '', note)}
              rows={2}
              placeholder="Variations, distances, swaps…"
              style={{ width: '100%', background: '#0c0a09', border: '1px solid #292524', borderRadius: 8, padding: '7px 10px', fontSize: 12, color: '#e7e5e4', resize: 'none', fontFamily: 'system-ui', boxSizing: 'border-box' }}
            />
          </div>
        </div>
      )}
    </div>
  );
}

function SessionSummary({ day, exData, loggedIds, onDone }) {
  const increases = loggedIds.map(id => {
    const hist = exData[id].history;
    if (hist.length < 2) return null;
    const prev = hist[hist.length - 2]?.weightLabel;
    const curr = hist[hist.length - 1]?.weightLabel;
    if (prev && curr && prev !== curr) return `${EXERCISES[id].name}: ${prev} → ${curr}`;
    return null;
  }).filter(Boolean);

  const summaryText = (() => {
    const lines = loggedIds.map(id => {
      const ex = EXERCISES[id];
      const last = exData[id].history[exData[id].history.length - 1];
      if (!last) return null;
      const setsDesc = last.sets.map(s => ex.noReps ? `e${s.effort}` : `${s.reps}@e${s.effort}`).join(', ');
      return `• ${ex.name} (${last.weightLabel}): ${setsDesc}`;
    }).filter(Boolean).join('\n');

    return `[Training log — Day ${day} session complete]\n\n` +
      `Exercises logged:\n${lines}\n\n` +
      `Weight increases this session:\n${increases.length ? increases.map(i => `• ${i}`).join('\n') : '• None'}\n\n` +
      `Can you give me a quick review, flag anything for my right elbow (tennis elbow), and give one priority focus for next time?`;
  })();

  return (
    <div style={{ margin: '16px 0', border: '1px solid #3f3f46', borderRadius: 14, background: '#18181b', overflow: 'hidden' }}>
      <div style={{ padding: '14px 16px', borderBottom: '1px solid #27272a' }}>
        <div style={{ fontSize: 16, fontWeight: 700, color: '#f4f4f5' }}>Session complete 🎉</div>
        <div style={{ fontSize: 13, color: '#71717a', marginTop: 2 }}>Day {day} · {loggedIds.length} exercises logged</div>
      </div>

      {increases.length > 0 && (
        <div style={{ padding: '12px 16px', borderBottom: '1px solid #27272a' }}>
          <div style={{ fontSize: 11, color: '#71717a', marginBottom: 6, fontWeight: 600, textTransform: 'uppercase', letterSpacing: '0.06em' }}>Weight increases</div>
          {increases.map((inc, i) => (
            <div key={i} style={{ fontSize: 13, color: '#86efac', marginBottom: 3 }}>↑ {inc}</div>
          ))}
        </div>
      )}

      <div style={{ padding: '12px 16px', display: 'flex', flexDirection: 'column', gap: 8 }}>
        <CopySummaryButton text={summaryText} label="Copy session summary to ask Claude →" />
        <button
          onClick={onDone}
          style={{ width: '100%', padding: 11, borderRadius: 8, background: '#16a34a', border: 'none', color: '#fff', fontSize: 14, fontWeight: 700, cursor: 'pointer' }}
        >
          Finish &amp; save session ✓
        </button>
      </div>
    </div>
  );
}

function TrainingLog() {
  const [day, setDay] = useState('1');
  const [exData, setExData] = useState(null);
  const [loading, setLoading] = useState(true);
  const [loggedIds, setLoggedIds] = useState([]);
  const [sessionDone, setSessionDone] = useState(false);

  useEffect(() => {
    (async () => {
      try {
        const r = await storage.get(STORAGE_KEY);
        setExData(JSON.parse(r.value));
      } catch {
        const d = buildDefaultState();
        setExData(d);
        try { await storage.set(STORAGE_KEY, JSON.stringify(d)); } catch {}
      }
      setLoading(false);
    })();
  }, []);

  useEffect(() => { setLoggedIds([]); setSessionDone(false); }, [day]);

  const persist = async (next) => {
    setExData(next);
    try { await storage.set(STORAGE_KEY, JSON.stringify(next)); } catch {}
  };

  const handleLog = (id, sets, sug) => {
    const ex = EXERCISES[id];
    const cur = exData[id];
    const next = { ...cur, history: [...cur.history] };
    if (ex.weightL !== undefined) {
      const newL = sug.action === 'increase' ? cur.weightL + ex.increment : cur.weightL;
      next.weightL = newL;
      next.history.push({ date: new Date().toISOString().slice(0,10), weightLabel: `L${newL}/R${cur.weightR}`, sets });
    } else {
      const newW = sug.action === 'increase' ? +(cur.weight + ex.increment).toFixed(2) : cur.weight;
      next.weight = newW;
      next.history.push({ date: new Date().toISOString().slice(0,10), weightLabel: `${newW}${ex.unit}`, sets });
    }
    next.history = next.history.slice(-6);
    persist({ ...exData, [id]: next });
    setLoggedIds(prev => prev.includes(id) ? prev : [...prev, id]);
  };

  const handleNoteChange = (id, updates, changeText, directNote) => {
    const cur = { ...exData[id] };
    if (directNote !== undefined) {
      cur.notes = directNote;
    } else {
      if (updates.weight != null) cur.weight = updates.weight;
      if (updates.weightL != null) cur.weightL = updates.weightL;
      if (updates.weightR != null) cur.weightR = updates.weightR;
      if (changeText) cur.notes = changeText;
    }
    persist({ ...exData, [id]: cur });
  };

  const handleReset = async () => {
    if (!window.confirm('Reset all progress back to starting weights?')) return;
    const d = buildDefaultState();
    await persist(d);
    setLoggedIds([]);
    setSessionDone(false);
  };

  const allLogged = exData && DAYS[day].every(id => loggedIds.includes(id));

  if (loading) return (
    <div style={{ minHeight: 200, display: 'flex', alignItems: 'center', justifyContent: 'center', background: '#0c0a09', color: '#78716c', fontFamily: 'system-ui' }}>
      Loading…
    </div>
  );

  return (
    <div style={{ minHeight: '100vh', background: '#0c0a09', color: '#f5f5f4', padding: '16px', maxWidth: 480, margin: '0 auto', fontFamily: 'system-ui, sans-serif' }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 16 }}>
        <span style={{ fontSize: 22 }}>🏋️</span>
        <h1 style={{ fontSize: 18, fontWeight: 700, margin: 0 }}>Training Log</h1>
      </div>

      <div style={{ display: 'flex', gap: 6, marginBottom: 16 }}>
        {Object.keys(DAYS).map(d => (
          <button key={d} onClick={() => setDay(d)} style={{
            flex: 1, padding: '8px 4px', borderRadius: 8,
            border: '1px solid', borderColor: d === day ? '#c2410c' : '#292524',
            background: d === day ? '#c2410c' : '#1c1917',
            color: d === day ? '#fff' : '#78716c',
            fontSize: 13, fontWeight: 600, cursor: 'pointer'
          }}>
            Day {d}
          </button>
        ))}
      </div>

      {sessionDone ? (
        <div style={{ textAlign: 'center', padding: '40px 20px' }}>
          <div style={{ fontSize: 40, marginBottom: 12 }}>✅</div>
          <div style={{ fontSize: 18, fontWeight: 700, color: '#86efac', marginBottom: 6 }}>Session saved!</div>
          <div style={{ fontSize: 14, color: '#78716c', marginBottom: 20 }}>All weights and notes updated for next time.</div>
          <button
            onClick={() => { setSessionDone(false); setLoggedIds([]); }}
            style={{ padding: '10px 24px', borderRadius: 8, background: '#1c1917', border: '1px solid #292524', color: '#f5f5f4', fontSize: 14, cursor: 'pointer' }}
          >
            Start another session
          </button>
        </div>
      ) : (
        <>
          {DAYS[day].map((id, idx) => (
            <ExerciseCard
              key={`${day}-${id}-${idx}`}
              id={id} ex={EXERCISES[id]} data={exData[id]}
              onLog={handleLog} onNoteChange={handleNoteChange}
            />
          ))}

          {loggedIds.length > 0 && !allLogged && (
            <>
              <div style={{ textAlign: 'center', fontSize: 13, color: '#57534e', padding: '10px 0' }}>
                {loggedIds.length} / {DAYS[day].length} exercises logged
              </div>
              <button
                onClick={() => setSessionDone(true)}
                style={{ width: '100%', padding: 10, borderRadius: 8, background: 'none', border: '1px solid #292524', color: '#57534e', fontSize: 13, cursor: 'pointer' }}
              >
                Finish early (save partial session)
              </button>
            </>
          )}

          {allLogged && (
            <SessionSummary day={day} exData={exData} loggedIds={loggedIds} onDone={() => setSessionDone(true)} />
          )}
        </>
      )}

      <button
        onClick={handleReset}
        style={{ display: 'flex', alignItems: 'center', gap: 6, fontSize: 12, color: '#44403c', background: 'none', border: 'none', cursor: 'pointer', margin: '24px auto 0', padding: 6 }}
      >
        ↺ Reset all progress
      </button>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<TrainingLog />);

</script>
</body>
</html>
